<style>
    
/* Estilos CSS para los rectángulos */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
.rectangulo-superior {
    width: 100%;
    height: 100px; /* Ajusta la altura según necesites */
    background-color: #FC7190; /* Color del rectángulo superior */
    display: flex;
    justify-content: center; /* Centra horizontalmente */
    align-items: center; /* Centra verticalmente */
    text-decoration-color: white;
}
.logomenu{
    display:flex;
    height: 100px;
    width: 100px;
    float: left;
    padding-right: 80px;
}
.rectangulo-superior h1 {
    margin: 0; /* Elimina el margen del título */
    color: white; /* Color del texto */
}
.columnas-imagenes {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    padding: 20px;
}
.columnas-imagenes .columna {
    flex: 1 1 20%; /* Ajusta el tamaño de cada columna */
    margin: 10px;
    position: relative; /* Para posicionar los videos relativamente */
}
.columnas-imagenes .columna:not(:first-child) {
    margin-top: 20px; /* Espacio adicional arriba excepto para la primera columna */
}
.columnas-imagenes .columna img {
    width: 100%;
    display: block;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    margin-bottom: 10px; /* Espacio entre imágenes */
}
.columnas-imagenes .columna video {
    width: 100%;
    display: block;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    margin-top: 10px; /* Espacio entre video e imágenes */
}
.rectangulo-CENTRAL {
    width: 100%;
    height: 300px; /* Ajusta la altura según necesites */
    background-color: #fcdd51; /* Color del rectángulo inferior */
}

/* Estilos para hacer la página responsive */
@media (max-width: 768px) {
    .columnas-imagenes .columna {
        flex: 1 1 45%; /* Cambia el tamaño de las columnas para dispositivos más pequeños */
    }
}
@media (max-width: 576px) {
    .columnas-imagenes .columna {
        flex: 1 1 100%; /* Cambia el tamaño de las columnas para dispositivos móviles */
        margin-top: 10px; /* Reduce el espacio entre columnas */
}
}
</style>
